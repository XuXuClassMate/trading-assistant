<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>
  
  <!-- Trading Chart Line -->
  <polyline 
    points="40,120 60,110 80,130 100,90 120,100 140,70 160,80" 
    fill="none" 
    stroke="#10b981" 
    stroke-width="4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Area under chart -->
  <polyline 
    points="40,120 60,110 80,130 100,90 120,100 140,70 160,80 160,150 40,150" 
    fill="url(#chartGradient)" 
    stroke="none"
  />
  
  <!-- Candlesticks -->
  <g stroke="#f59e0b" stroke-width="3" stroke-linecap="round">
    <line x1="55" y1="95" x2="55" y2="125"/>
    <rect x="50" y="100" width="10" height="15" fill="#f59e0b" rx="2"/>
    
    <line x1="85" y1="85" x2="85" y2="115"/>
    <rect x="80" y="90" width="10" height="18" fill="#f59e0b" rx="2"/>
    
    <line x1="115" y1="75" x2="115" y2="105"/>
    <rect x="110" y="80" width="10" height="20" fill="#f59e0b" rx="2"/>
  </g>
  
  <!-- AI/Brain Icon (subtle) -->
  <circle cx="140" cy="60" r="18" fill="rgba(255,255,255,0.2)"/>
  <path d="M132 55 Q140 50 148 55" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  <circle cx="136" cy="62" r="2" fill="#fff"/>
  <circle cx="144" cy="62" r="2" fill="#fff"/>
  <path d="M135 68 Q140 72 145 68" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Grid Lines (subtle) -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="30" y1="80" x2="170" y2="80"/>
    <line x1="30" y1="100" x2="170" y2="100"/>
    <line x1="30" y1="120" x2="170" y2="120"/>
  </g>
</svg>
