name: Publish to PyPI / 发布到 PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.3.0)'
        required: true
        type: string

jobs:
  build-and-publish:
    name: Build and Publish to PyPI / 构建并发布到 PyPI
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4
      
      - name: Get version / 获取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Set up Python / 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build tools / 安装构建工具
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Build package / 构建包
        run: |
          python -m build
      
      - name: Publish to PyPI / 发布到 PyPI
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "📦 Publishing to PyPI..."
          twine upload --username __token__ --password $PYPI_API_TOKEN dist/*
          echo ""
          echo "✅ Published to PyPI!"
          echo ""
          echo "🔗 Package URL:"
          echo "   https://pypi.org/project/openclaw-trading-assistant/${{ steps.version.outputs.version }}/"
          echo ""
          echo "📦 Install command:"
          echo "   pip install openclaw-trading-assistant==${{ steps.version.outputs.version }}"
