name: Publish Docker Image / 发布 Docker 镜像

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build-and-push:
    name: Build and Push Docker Image / 构建并推送 Docker 镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4
      
      - name: Get version / 获取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Set up Docker Buildx / 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to GitHub Container Registry / 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata / 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/trading-assistant
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest
      
      - name: Build and push Docker image / 构建并推送 Docker 镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Show image info / 显示镜像信息
        run: |
          echo "✅ Docker image published!"
          echo ""
          echo "📦 GitHub Container Registry:"
          echo "   ghcr.io/${{ github.repository_owner }}/trading-assistant:${{ steps.version.outputs.version }}"
          echo "   ghcr.io/${{ github.repository_owner }}/trading-assistant:latest"
          echo ""
          echo "🔗 Packages URL:"
          echo "   https://github.com/${{ github.repository_owner }}/trading-assistant/pkgs/container/trading-assistant"
