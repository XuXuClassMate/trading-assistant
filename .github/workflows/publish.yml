name: Publish to PyPI & GitHub / 发布到 PyPI 和 GitHub

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build-and-publish:
    name: Build and Publish / 构建并发布
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python / 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build tools / 安装构建工具
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Get version / 获取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Publishing version: $VERSION"
      
      - name: Update version in pyproject.toml / 更新版本号
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          cat pyproject.toml | grep "^version"
      
      - name: Build package / 构建包
        run: |
          python -m build
          echo "Built files:"
          ls -lh dist/
      
      - name: Publish to GitHub Packages / 发布到 GitHub Packages
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://pypi.pkg.github.com/XuXuClassMate
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload to GitHub Release / 上传到 GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Print installation instructions / 打印安装说明
        run: |
          echo "✅ Package published successfully!"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo ""
          echo "Files created:"
          ls -lh dist/
          echo ""
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "📦 Uploaded to GitHub Release"
            echo ""
            echo "Install with:"
            echo "  pip install --index-url https://pypi.pkg.github.com/XuXuClassMate openclaw-trading-assistant==${{ steps.version.outputs.version }}"
          else
            echo "⚠️ Manual run - files not attached to release"
            echo "   Create a release tag to attach artifacts"
          fi
