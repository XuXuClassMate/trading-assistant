name: Publish to GitHub Packages (npm) / 发布到 GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    name: Build and Publish to GitHub Packages / 构建并发布到 GitHub Packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4
      
      - name: Set up Python / 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Set up Node.js / 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
      
      - name: Build Python package / 构建 Python 包
        run: |
          python -m pip install build
          python -m build
          ls -lh dist/
      
      - name: Get version / 获取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Create npm package.json / 创建 npm 包配置
        run: |
          cat > package.json << 'EOF'
          {
            "name": "@xuxuclassmate/openclaw-trading-assistant",
            "version": "VERSION_PLACEHOLDER",
            "description": "OpenClaw Trading Assistant - Python package with wheel files",
            "repository": "https://github.com/XuXuClassMate/trading-assistant",
            "license": "MIT",
            "files": [
              "dist/*"
            ]
          }
          EOF
          sed -i "s/VERSION_PLACEHOLDER/${{ steps.version.outputs.version }}/g" package.json
          cat package.json
      
      - name: Copy Python wheels to npm package / 复制 Python wheel 文件
        run: |
          mkdir -p dist
          cp -r ../dist/* dist/
          ls -la dist/
      
      - name: Publish to GitHub Packages (npm) / 发布到 GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Upload to Release / 上传到 Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          tag_name: v${{ steps.version.outputs.version }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
