name: Build and Upload Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ========================================
      # Python pip package
      # ========================================
      - name: Build Python package (pip)
        run: |
          echo "🐍 Building Python package..."
          pip install build wheel
          python -m build
          echo "✅ Python package built"
          ls -lh dist/

      # ========================================
      # npm package (if package.json exists)
      # ========================================
      - name: Check for package.json
        id: check_npm
        run: |
          if [ -f package.json ]; then
            echo "has_npm=true" >> $GITHUB_OUTPUT
          else
            echo "has_npm=false" >> $GITHUB_OUTPUT
          fi

      - name: Build npm package
        if: steps.check_npm.outputs.has_npm == 'true'
        run: |
          echo "📦 Building npm package..."
          npm install
          npm pack
          echo "✅ npm package built"
          ls -lh *.tgz

      # ========================================
      # Source tarball (for ClawHub)
      # ========================================
      - name: Create source tarball
        run: |
          echo "📦 Creating trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz"
          
          # 创建临时目录
          TEMP_DIR=$(mktemp -d)
          
          # 复制必要文件
          cp -r . "${TEMP_DIR}/src"
          
          # 删除不需要的文件
          cd "${TEMP_DIR}/src"
          rm -rf .git .github __pycache__ node_modules .pytest_cache
          rm -rf reports logs data sent portfolio cache site daily_reports
          rm -f .env config.json feishu_config.json watchlist.txt
          rm -f *.log *.tar.gz *.tgz
          rm -f accuracy_log.json sentiment_report.json
          rm -f screenshots_*.txt
          rm -f PUSH_COMPLETE.md GITHUB_RELEASE_INSTRUCTIONS.md
          rm -f create_upload_tarball.sh
          rm -f GITHUB_ACTIONS_SETUP.md GITHUB_ACTIONS_MULTI_BUILD.md
          rm -f CLAWHUB_UPLOAD_READY.md REBUILD_NOTES.md RE_PUSH_COMPLETE.md
          rm -f build_clawhub.sh
          
          # 打包
          cd "${TEMP_DIR}"
          tar -czf "${{ github.workspace }}/trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz" src
          
          # 清理
          rm -rf "${TEMP_DIR}"
          
          echo "✅ Source tarball created"
          ls -lh "${{ github.workspace }}/trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz"

      - name: Verify tarball contents
        run: |
          echo "🔍 Verifying tarball contents..."
          echo ""
          echo "Checking for i18n files:"
          if tar -tzf trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz | grep -E "i18n|locales" > /dev/null 2>&1; then
            echo "✅ i18n files found:"
            tar -tzf trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz | grep -E "i18n|locales" || true
          else
            echo "⚠️ Warning: No i18n files found in tarball"
          fi
          echo ""
          echo "📊 Total files: $(tar -tzf trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz | wc -l)"

      # ========================================
      # Generate release notes
      # ========================================
      - name: Generate release notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## 🔒 安全加固版本 Security Hardened Release

          ### 安全修复 Security Fixes
          - ✅ 移除所有 sys.path.insert() 调用 (9 files)
          - ✅ 移除运行时.env 文件加载 (4 files)
          - ✅ 从 config.py 移除 load_dotenv()
          - ✅ 移除兄弟模块导入 (optimizer, advanced_indicators, etc.)
          - ✅ 更新 SKILL.md 安全模型和作者信息

          ### 审计状态 Audit Status
          - ✅ READS_SIBLING_ENV_FILE - Fixed
          - ✅ IMPORTS_SIBLING_TRADINGAGENTS - Fixed
          - ✅ LOADS_LOCAL_.ENV_TO_ENVVARS - Fixed

          ### 📦 安装方式 Installation

          #### Python pip (推荐 Recommended)
          ```bash
          # Download
          wget https://github.com/XuXuClassMate/trading-assistant/releases/download/v${{ steps.get_version.outputs.version }}/trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz

          # Install
          pip install trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz
          ```

          #### npm (if available)
          ```bash
          npm install trading-assistant-v${{ steps.get_version.outputs.version }}.tgz
          ```

          #### ClawHub (OpenClaw)
          ```bash
          clawhub install trading-assistant@${{ steps.get_version.outputs.version }}
          ```

          ### ⚠️ 破坏性变更 Breaking Changes
          - API 密钥必须通过环境变量设置 (不再支持.env 文件)
            ```bash
            export TWELVE_DATA_API_KEY=your_key
            export ALPHA_VANTAGE_API_KEY=your_key
            ```
          - 移除 python-dotenv 依赖

          ### 📝 文档 Documentation
          - SECURITY_FIXES_v2.0.0.md - 详细修复日志 Detailed fixes
          - SECURITY_FIX_SUMMARY.md - 执行摘要 Executive summary
          - UPLOAD_INSTRUCTIONS_v2.0.0.md - 上传说明 Upload instructions
          - 修复完成报告.md - 中文报告 Chinese report
          - README_en.md - English documentation
          - README.md - 中文文档

          ### 🔗 链接 Links
          - GitHub: https://github.com/XuXuClassMate/trading-assistant
          - ClawHub: https://clawhub.com/skills/trading-assistant
          - Issues: https://github.com/XuXuClassMate/trading-assistant/issues

          ---

          **作者 Author**: XuXuClassMate  
          **许可证 License**: MIT  
          **更新时间 Updated**: $(date +%Y-%m-%d)
          EOF

      # ========================================
      # Create GitHub Release
      # ========================================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.get_version.outputs.version }} - Security Hardened
          body_path: release_notes.md
          files: |
            dist/*.tar.gz
            dist/*.whl
            *.tgz
            trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload summary
        run: |
          echo "✅ Release created successfully!"
          echo ""
          echo "📦 Release Details:"
          echo "   Version: v${{ steps.get_version.outputs.version }}"
          echo "   URL: https://github.com/XuXuClassMate/trading-assistant/releases/tag/v${{ steps.get_version.outputs.version }}"
          echo ""
          echo "📦 Available Assets:"
          echo "   - Python pip: *.tar.gz, *.whl (in dist/)"
          echo "   - npm: *.tgz (if package.json exists)"
          echo "   - Source: trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz"
          echo ""
          echo "🎉 GitHub Actions build complete!"
