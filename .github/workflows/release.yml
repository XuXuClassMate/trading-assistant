name: Build and Upload to All Repositories

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Building version: $VERSION"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      # ========================================
      # Python pip package (PyPI)
      # ========================================
      - name: Build Python package
        run: |
          echo "🐍 Building Python package for PyPI..."
          pip install build wheel
          python -m build
          echo "✅ Python package built"
          ls -lh dist/

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          echo "📤 Publishing to PyPI..."
          pip install twine
          if [ -n "$PYPI_API_TOKEN" ]; then
            twine upload dist/* -u __token__ -p "$PYPI_API_TOKEN"
            echo "✅ Published to PyPI"
          else
            echo "⚠️ PyPI API token not configured, skipping upload"
          fi

      # ========================================
      # npm package
      # ========================================
      - name: Check for package.json
        id: check_npm
        run: |
          if [ -f package.json ]; then
            echo "has_npm=true" >> $GITHUB_OUTPUT
          else
            echo "has_npm=false" >> $GITHUB_OUTPUT
          fi

      - name: Build npm package
        if: steps.check_npm.outputs.has_npm == 'true'
        run: |
          echo "📦 Building npm package..."
          npm install
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [[ "$PKG_NAME" == @* ]]; then
            FILE_NAME="${PKG_NAME#*-}-${PKG_VERSION}.tgz"
          else
            FILE_NAME="${PKG_NAME}-${PKG_VERSION}.tgz"
          fi
          npm pack
          echo "✅ npm package built: $FILE_NAME"
          ls -lh *.tgz
          echo "file_name=$FILE_NAME" >> $GITHUB_OUTPUT

      - name: Publish to npmjs.com
        if: steps.check_npm.outputs.has_npm == 'true' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "📤 Publishing to npmjs.com..."
          if [ -n "$NODE_AUTH_TOKEN" ]; then
            npm publish *.tgz --access public
            echo "✅ Published to npmjs.com"
          else
            echo "⚠️ npm token not configured, skipping upload"
          fi

      - name: Publish to GitHub Packages (npm)
        if: steps.check_npm.outputs.has_npm == 'true' && startsWith(github.ref, 'refs/tags/v')
        continue-on-error: true
        run: |
          echo "📤 Publishing to GitHub Packages..."
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.GITHUB_TOKEN }}" > ~/.npmrc
          npm set registry https://npm.pkg.github.com
          npm set @xuxuclassmate:registry https://npm.pkg.github.com
          npm publish *.tgz --access public || echo "⚠️ GitHub Packages 发布失败，继续执行"
          echo "✅ Published to GitHub Packages"

      # ========================================
      # Docker image (GitHub Container Registry)
      # ========================================
      - name: Check for Dockerfile
        id: check_docker
        run: |
          if [ -f Dockerfile ]; then
            echo "has_docker=true" >> $GITHUB_OUTPUT
          else
            echo "has_docker=false" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        if: steps.check_docker.outputs.has_docker == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        if: steps.check_docker.outputs.has_docker == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Build and push Docker image to GHCR
        if: steps.check_docker.outputs.has_docker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ========================================
      # Docker Hub (optional)
      # ========================================
      - name: Log in to Docker Hub
        if: steps.check_docker.outputs.has_docker == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        if: steps.check_docker.outputs.has_docker == 'true'
        id: dockerhub_meta
        uses: docker/metadata-action@v5
        with:
          images: xuxuclassmate/trading-assistant
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image to Docker Hub
        if: steps.check_docker.outputs.has_docker == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.dockerhub_meta.outputs.tags }}
          labels: ${{ steps.dockerhub_meta.outputs.labels }}

      # ========================================
      # Source tarball (for ClawHub)
      # ========================================
      - name: Create source tarball
        run: |
          echo "📦 Creating trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz"
          tar -czf trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz \
            --exclude='*.tar.gz' \
            --exclude='*.tgz' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='reports' \
            --exclude='logs' \
            --exclude='data' \
            --exclude='sent' \
            --exclude='portfolio' \
            --exclude='cache' \
            --exclude='.env' \
            --exclude='config.json' \
            --exclude='feishu_config.json' \
            --exclude='watchlist.txt' \
            --exclude='accuracy_log.json' \
            --exclude='sentiment_report.json' \
            --exclude='*.log' \
            --exclude='.pytest_cache' \
            --exclude='site' \
            --exclude='daily_reports' \
            --exclude='screenshots_*.txt' \
            .
          
          echo "✅ Source tarball created"
          ls -lh trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz

      - name: Verify tarball contents
        run: |
          echo "🔍 Verifying tarball contents..."
          echo ""
          echo "Checking for i18n files:"
          if tar -tzf trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz | grep -E "i18n|locales" > /dev/null 2>&1; then
            echo "✅ i18n files found:"
            tar -tzf trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz | grep -E "i18n|locales" || true
          else
            echo "⚠️ Warning: No i18n files found in tarball"
          fi
          echo ""
          echo "📊 Total files: $(tar -tzf trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz | wc -l)"

      # ========================================
      # Generate release notes
      # ========================================
      - name: Generate release notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## 🔒 安全加固版本 Security Hardened Release

          ### 安全修复 Security Fixes
          - ✅ 移除所有 sys.path.insert() 调用 (9 files)
          - ✅ 移除运行时.env 文件加载 (4 files)
          - ✅ 从 config.py 移除 load_dotenv()
          - ✅ 移除兄弟模块导入 (optimizer, advanced_indicators, etc.)
          - ✅ 更新 SKILL.md 安全模型和作者信息

          ### ClawHub 审查问题修复
          - ✅ 修复依赖声明 (明确使用 requests 库)
          - ✅ 修复.env 配置说明 (不自动加载)
          - ✅ 添加 get_api_key() 兼容函数
          - ✅ 添加 FEISHU_WEBHOOK_URL 到 requires.env

          ### 📦 安装方式 Installation

          #### Python pip (PyPI)
          ```bash
          pip install trading-assistant==${{ steps.get_version.outputs.version }}
          ```

          #### npm
          ```bash
          npm install trading-assistant@${{ steps.get_version.outputs.version }}
          ```

          #### Docker
          ```bash
          docker pull ghcr.io/XuXuClassMate/trading-assistant:${{ steps.get_version.outputs.version }}
          docker run -e TWELVE_DATA_API_KEY=your_key -e ALPHA_VANTAGE_API_KEY=your_key ghcr.io/XuXuClassMate/trading-assistant:${{ steps.get_version.outputs.version }}
          ```

          #### Docker Hub
          ```bash
          docker pull xuxuclassmate/trading-assistant:${{ steps.get_version.outputs.version }}
          ```

          #### ClawHub (OpenClaw)
          ```bash
          clawhub install trading-assistant@${{ steps.get_version.outputs.version }}
          ```

          ### ⚠️ 破坏性变更 Breaking Changes
          - API 密钥必须通过环境变量设置 (不再支持.env 文件)
            ```bash
            export TWELVE_DATA_API_KEY=your_key
            export ALPHA_VANTAGE_API_KEY=your_key
            ```
          - 移除 python-dotenv 依赖

          ### 📝 文档 Documentation
          - SECURITY_FIXES_v2.0.0.md - 详细修复日志 Detailed fixes
          - SECURITY_FIX_SUMMARY.md - 执行摘要 Executive summary
          - README_en.md - English documentation
          - README.md - 中文文档

          ### 🔗 链接 Links
          - GitHub: https://github.com/XuXuClassMate/trading-assistant
          - PyPI: https://pypi.org/project/trading-assistant
          - npm: https://www.npmjs.com/package/trading-assistant
          - Docker Hub: https://hub.docker.com/r/xuxuclassmate/trading-assistant
          - GHCR: https://github.com/XuXuClassMate/trading-assistant/pkgs/container/trading-assistant
          - ClawHub: https://clawhub.com/skills/trading-assistant

          ---

          **作者 Author**: XuXuClassMate  
          **许可证 License**: MIT  
          **更新时间 Updated**: $(date +%Y-%m-%d)
          EOF

      # ========================================
      # Create GitHub Release
      # ========================================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.get_version.outputs.version }} - Security Hardened
          body_path: release_notes.md
          files: |
            dist/*.tar.gz
            dist/*.whl
            *.tgz
            trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload summary
        run: |
          echo "✅ Release created successfully!"
          echo ""
          echo "📦 Release Details:"
          echo "   Version: v${{ steps.get_version.outputs.version }}"
          echo "   URL: https://github.com/XuXuClassMate/trading-assistant/releases/tag/v${{ steps.get_version.outputs.version }}"
          echo ""
          echo "📦 Available Assets:"
          echo "   - Python pip: *.tar.gz, *.whl (in dist/)"
          echo "   - npm: *.tgz"
          echo "   - Source: trading-assistant-v${{ steps.get_version.outputs.version }}-security.tar.gz"
          echo "   - Docker: ghcr.io/XuXuClassMate/trading-assistant:v${{ steps.get_version.outputs.version }}"
          echo "   - Docker Hub: xuxuclassmate/trading-assistant:v${{ steps.get_version.outputs.version }}"
          echo ""
          echo "🎉 Multi-repository release complete!"
