name: Test Upload / 测试上传

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install tools
        run: pip install build twine
      
      - name: Build
        run: python -m build
      
      - name: Debug upload
        run: |
          echo "=== Testing upload ==="
          echo "Files in dist/:"
          ls -la dist/
          echo ""
          echo "Trying upload with verbose mode..."
          twine upload \
            --repository-url https://pypi.pkg.github.com \
            -u __token__ \
            -p ${{ secrets.GITHUB_TOKEN }} \
            --verbose \
            dist/* 2>&1 || echo "Upload failed with code: $?"
