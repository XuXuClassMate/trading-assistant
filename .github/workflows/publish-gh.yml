name: Publish to GitHub Packages / 发布到 GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    name: Build and Publish / 构建并发布
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4
      
      - name: Set up Python / 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies / 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      
      - name: Get version / 获取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Update version in pyproject.toml / 更新版本号
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          cat pyproject.toml | grep "^version"
      
      - name: Build package / 构建包
        run: python -m build
      
      - name: Show built files / 显示构建的文件
        run: ls -lh dist/
      
      - name: Upload to GitHub Packages with twine
        run: |
          echo "Uploading to GitHub Packages..."
          echo "Repository URL: https://pypi.pkg.github.com"
          echo "Username: __token__"
          
          for file in dist/*; do
            echo "Uploading $file..."
            twine upload \
              --repository-url https://pypi.pkg.github.com \
              -u __token__ \
              -p ${{ secrets.GITHUB_TOKEN }} \
              --verbose \
              "$file"
          done
      
      - name: Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          tag_name: v${{ steps.version.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
