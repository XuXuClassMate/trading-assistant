name: Publish to GitHub Releases / 发布到 GitHub Releases

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    name: Build and Upload / 构建并上传
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    
    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4
      
      - name: Set up Python / 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build tools / 安装构建工具
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Get version / 获取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Update version / 更新版本号
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          cat pyproject.toml | grep "^version"
      
      - name: Build / 构建
        run: python -m build
      
      - name: Show built files / 显示构建的文件
        run: |
          echo "Built files:"
          ls -lh dist/
      
      - name: Create or Update Release and Upload Assets
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Print installation instructions / 打印安装说明
        run: |
          echo "✅ Package published successfully!"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo ""
          echo "📦 GitHub Releases URL:"
          echo "   https://github.com/XuXuClassMate/trading-assistant/releases"
          echo ""
          echo "📥 Install from Release:"
          echo "   pip install https://github.com/XuXuClassMate/trading-assistant/releases/download/v\${{ steps.version.outputs.version }}/openclaw_trading_assistant-\${{ steps.version.outputs.version }}-py3-none-any.whl"
