name: Publish to GitHub Packages / 发布到 GitHub Packages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build:
    name: Build package / 构建包
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout / 检出代码
        uses: actions/checkout@v4
      
      - name: Set up Python / 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install build tools / 安装构建工具
        run: |
          python -m pip install --upgrade pip
          pip install build
      
      - name: Get version / 获取版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=${{ github.event.inputs.version }}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
      
      - name: Update version / 更新版本号
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          cat pyproject.toml | grep "^version"
      
      - name: Build / 构建
        run: python -m build
      
      - name: Upload to GitHub Packages / 上传到 GitHub Packages
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Use GITHUB_TOKEN - action will automatically publish to GitHub Packages
          password: ${{ secrets.GITHUB_TOKEN }}
          # Skip attestation - not supported by GitHub Packages
          skip-existing: true
      
      - name: Upload artifacts to Release / 上传到 Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Print success message / 打印成功消息
        run: |
          echo "✅ Package built successfully!"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo ""
          echo "Files created:"
          ls -lh dist/
          echo ""
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "📦 Uploaded to GitHub Release"
          else
            echo "⚠️ Manual run - files not attached to release"
            echo "   To attach to a release, create a release tag with the same version"
          fi
